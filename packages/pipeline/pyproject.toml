[project]
name = "lakehouse-pipeline"
version = "0.1.0"
description = "Pipeline package for AIS MobilityDuck lakehouse"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "duckdb==1.4.4",
    "pandas==2.*",
    "pyarrow>=15",
    "requests==2.*",
]

[project.optional-dependencies]
dev = ["pytest>=9.0.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lakehouse_pipeline"]
