[project]
name = "lakehouse"
version = "0.1.0"
description = "CLI for the AIS MobilityDuck lakehouse pipeline"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic-settings==2.*",
    "typer==0.12.*",
    "click<8.2",
    "rich==13.*",
    "lakehouse-pipeline",
    "matplotlib>=3.10.9",
    "pyiceberg[sql-sqlite,pyarrow]>=0.8",
]

[project.scripts]
lakehouse = "lakehouse.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lakehouse"]

[tool.hatch.metadata]
allow-direct-references = true
