# MinIO console: http://localhost:9001  (admin / password)

services:
  minio:
    image: minio/minio:latest
    container_name: ais-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  # one-shot: create the warehouse bucket, then exit
  minio-init:
    image: minio/mc:latest
    container_name: ais-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 admin password; do sleep 1; done;
      mc mb -p local/warehouse || true;
      echo 'bucket s3://warehouse ready';
      "

  rest:
    image: apache/iceberg-rest-fixture:latest
    container_name: ais-iceberg-rest
    ports:
      - "8181:8181"
    depends_on:
      - minio
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1

volumes:
  minio-data:
